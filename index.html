<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人空间</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; margin: 0; padding: 0; background: #f4f4f4; }
        header { background: #333; color: #fff; padding: 1rem; text-align: center; }
        .container { width: 80%; margin: 2rem auto; background: #fff; padding: 2rem; border-radius: 8px; }
        h2 { color: #333; border-bottom: 2px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>欢迎来到我的网站</h1>
    </header>
    <div class="container">
        <section>
            <h2>关于我</h2>
            <p>这里可以写下你的个人简介，比如你对逻辑分析、系统测试或者生物进化的见解。</p>
        </section>
        
        <section class="grid">
            <div>
                <h2>核心兴趣</h2>
                <ul>
                    <li>游戏逻辑与系统测试</li>
                    <li>生物力学与自然科学</li>
                    <li>机械结构分析</li>
                </ul>
            </div>
            <div>
                <h2>最新项目</h2>
                <p>正在探索高效的网站构建方案以及自动化测试流程。</p>
            </div>
        </section>
    </div>
</body>
</html>
